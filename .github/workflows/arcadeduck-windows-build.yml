name: ArcadeDuck Windows Build

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - poc-preview
    tags:
      - "v*"
      - "poc-preview-v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022

    env:
      BUILD_CONFIGURATION: Release
      BUILD_PLATFORM: x64
      QT_VERSION: 6.1.0
      QT_INSTALL_ARCH: win64_msvc2019_64

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall

          $qtBase = Join-Path $env:GITHUB_WORKSPACE "dep\msvc\qt"

          python -m aqt install-qt `
            windows desktop `
            $env:QT_VERSION `
            $env:QT_INSTALL_ARCH `
            -O $qtBase

          $qmake = Get-ChildItem `
            -Path $qtBase `
            -Recurse `
            -Filter qmake.exe |
            Select-Object -First 1

          if (-not $qmake) {
            Get-ChildItem -Path $qtBase -Recurse
            throw "qmake.exe not found under $qtBase"
          }

          $qtRoot = $qmake.Directory.Parent.FullName
          $qtBin = $qmake.Directory.FullName

          "QTDIR=$qtRoot" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Append

          "$qtBin" | Out-File `
            -FilePath $env:GITHUB_PATH `
            -Append

          Write-Host "Qt root: $qtRoot"
          Write-Host "Qt tools: $qtBin"

      - name: Find MSBuild
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe |
            Select-Object -First 1

          if (-not $msbuild) {
            throw "MSBuild not found."
          }

          "MSBUILD_PATH=$msbuild" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Append

          Write-Host "MSBuild found at: $msbuild"

      - name: Find solution file
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Path . -Filter *.sln -Recurse |
            Select-Object -First 1

          if (-not $sln) {
            throw "No .sln file found."
          }

          "SOLUTION_FILE=$($sln.FullName)" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Append

          Write-Host "Solution found: $($sln.FullName)"

      - name: Build
        shell: pwsh
        run: |
          & "$env:MSBUILD_PATH" "$env:SOLUTION_FILE" `
            /m `
            /p:Configuration=$env:BUILD_CONFIGURATION `
            /p:Platform=$env:BUILD_PLATFORM `
            /p:PreferredToolArchitecture=x64

      - name: Package ArcadeDuck
        shell: pwsh
        run: |
          $packageRoot = "ArcadeDuck-windows-x64"
          $dist = "dist"

          Remove-Item $packageRoot, $dist -Recurse -Force -ErrorAction SilentlyContinue

          New-Item -ItemType Directory -Path $packageRoot | Out-Null
          New-Item -ItemType Directory -Path $dist | Out-Null

          if (Test-Path "bin\x64") {
            Copy-Item "bin\x64\*" $packageRoot -Recurse -Force
          } else {
            $qtExe = Get-ChildItem -Recurse -Filter "ArcadeDuck.exe" |
              Select-Object -First 1

            if (-not $qtExe) {
              throw "Could not find the ArcadeDuck Qt build output."
            }

            Copy-Item "$($qtExe.Directory.FullName)\*" $packageRoot -Recurse -Force
          }

          # Remove build-only and locally generated files from the staged package.
          Get-ChildItem $packageRoot -Recurse -File |
            Where-Object {
              $_.Extension -in @(".pdb", ".ilk", ".exp", ".lib") -or
              $_.Name -match "^(Qt6.*d|q.*d)\.dll$" -or
              $_.Name -like "common-tests*.exe" -or
              $_.Name -like "updater*.exe" -or
              $_.Name -like "duckstation*.exe" -or
              $_.Name -eq "arcadeduck.log" -or
              $_.Name -eq "settings.ini" -or
              $_.Name -eq "gamesettings.ini"
            } |
            Remove-Item -Force

          Get-ChildItem $packageRoot -Recurse `
            -Include *.iso,*.chd,*.cue,*.bin,*.apk,*.rom,*.key `
            -ErrorAction SilentlyContinue |
            Remove-Item -Force -ErrorAction SilentlyContinue

          New-Item -ItemType Directory -Path "$packageRoot\roms" -Force | Out-Null
          New-Item -ItemType Directory -Path "$packageRoot\bios" -Force | Out-Null
          New-Item -ItemType Directory -Path "$packageRoot\bezel" -Force | Out-Null

          if (Test-Path README.md) {
            Copy-Item README.md $packageRoot -Force
          }

          if (Test-Path LICENSE) {
            Copy-Item LICENSE $packageRoot -Force
          }

          $zipName = "ArcadeDuck-windows-x64.zip"

          Compress-Archive `
            -Path "$packageRoot\*" `
            -DestinationPath "$dist\$zipName" `
            -Force

      - name: Upload ArcadeDuck artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArcadeDuck-windows-x64
          path: dist/ArcadeDuck-windows-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"

          gh release create $tag dist/ArcadeDuck-windows-x64.zip `
            --title "ArcadeDuck $tag" `
            --generate-notes